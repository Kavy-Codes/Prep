<!DOCTYPE html>
<html>
<head>
  <title>Mind Maps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mindmaps.css">
  <script defer src="js/mindmaps.js"></script>
</head>
<body>

<div class="container">

  <h2>🧠 Mind Maps</h2>
  <p class="small">Select a chapter</p>

  <!-- CHAPTER LIST -->
  <div id="mindmapList" class="mindmap-list"></div>

  <!-- IMAGE VIEW -->
  <div id="mindmapViewer" class="mindmap-viewer hidden">
    <button class="back-btn" onclick="closeMindmap()">← Back</button>
    <img id="mindmapImage" alt="Mind Map">
  </div>

</div>

</body>
</html>
