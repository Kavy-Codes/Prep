<!DOCTYPE html>
<html>
<head>
  <title>Answer Writing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

<h2>Answer Writing Formula</h2>

<div class="card">
<b>2 Marks</b><br>
Definition (1–2 lines)
</div>

<div class="card">
<b>4 Marks</b><br>
Definition → 2–3 points → Example
</div>

<div class="card">
<b>6 Marks</b><br>
Definition → Explanation → Diagram → Example → Conclusion
</div>

<p class="small">Underline keywords. Draw diagrams even if simple.</p>

</div>
</body>
</html>
